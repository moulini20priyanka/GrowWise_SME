  <script>
    // Explore dropdown click toggle
    document.querySelectorAll('.site-header .hdr-item.hdr-has-drop > .hdr-link').forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        var parent = this.closest('.hdr-item.hdr-has-drop');
        var isOpen = parent.classList.contains('open');
        document.querySelectorAll('.site-header .hdr-item.hdr-has-drop').forEach(function(el) { el.classList.remove('open'); });
        if (!isOpen) parent.classList.add('open');
      });
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.site-header .hdr-item.hdr-has-drop')) {
        document.querySelectorAll('.site-header .hdr-item.hdr-has-drop').forEach(function(el) { el.classList.remove('open'); });
      }
    });

    // Theme toggle
    (function () {
      var toggle = document.getElementById('theme-toggle');
      var body = document.body;
      var saved = localStorage.getItem('theme');
      if (saved === 'dark') { body.classList.add('dark-mode'); toggle.textContent = '☀️'; }
      else { toggle.textContent = '🌙'; }
      toggle.addEventListener('click', function () {
        body.classList.toggle('dark-mode');
        if (body.classList.contains('dark-mode')) { toggle.textContent = '☀️'; localStorage.setItem('theme', 'dark'); }
        else { toggle.textContent = '🌙'; localStorage.setItem('theme', 'light'); }
      });
    })();
  </script>

<main>

<h2>Business & Entrepreneurship Schemes</h2>
<br>
<br>

<input type="text" id="searchInput" placeholder="Search scheme name...">

<div class="card-container" id="cardContainer"></div>

<!-- MODAL -->
<div id="schemeModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalData"></div>
    </div>
</div>

<script>

let allSchemes = [];

Papa.parse("schemesdata.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

        const data = results.data;

        // FILTER ONLY BUSINESS & ENTREPRENEURSHIP
        allSchemes = data.filter(row =>
            row.schemeCategory &&
            row.schemeCategory.trim().toLowerCase() === "business & entrepreneurship"
        );

        displaySchemes(allSchemes);
    }
});

function displaySchemes(data) {
    const container = document.getElementById("cardContainer");
    container.innerHTML = "";

    data.forEach((row, index) => {

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="badge">${row.level}</div>
            <h3>${row.scheme_name}</h3>
            <p>${row.details ? row.details.substring(0,120) + "..." : ""}</p>
            <button class="btn" onclick="openModal(${index})">Read More</button>
        `;

        container.appendChild(card);
    });
}

function openModal(index) {

    const scheme = allSchemes[index];

    document.getElementById("modalData").innerHTML = `
        <h2>${scheme.scheme_name}</h2>

        <div class="section-title">Level:</div>
        <p>${scheme.level}</p>

        <div class="section-title">Details:</div>
        <p>${scheme.details}</p>

        <div class="section-title">Benefits:</div>
        <p>${scheme.benefits}</p>

        <div class="section-title">Eligibility:</div>
        <p>${scheme.eligibility}</p>

        <div class="section-title">Documents Required:</div>
        <p>${scheme.documents}</p>

        <div class="section-title">Application Process:</div>
        <p>${scheme.application}</p>
    `;

    document.getElementById("schemeModal").style.display = "block";
}

function closeModal() {
    document.getElementById("schemeModal").style.display = "none";
}

document.getElementById("searchInput").addEventListener("input", function() {
    const value = this.value.toLowerCase();

    const filtered = allSchemes.filter(scheme =>
        scheme.scheme_name.toLowerCase().includes(value)
    );

    displaySchemes(filtered);
});

</script>


</main>

<script>
  function setupTabs(tabContainerId, contentContainerId){
  const tabs = document.querySelectorAll(`#${tabContainerId} .tab`);
  const contents = document.querySelectorAll(`#${contentContainerId} .tab-content`);
  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      tabs.forEach(t => t.classList.remove("active"));
      contents.forEach(c => c.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(tab.dataset.tab).classList.add("active");
    });
  });
}
setupTabs("schemeTabs","schemeContents");
setupTabs("loanTabs","loanContents");

// Modal logic
const overlay = document.getElementById("overlay");
const modalTitle = document.getElementById("modalTitle");
const modalDesc = document.getElementById("modalDesc");
const modalLink = document.getElementById("modalLink");
const closeBtn = document.getElementById("closeBtn");

document.querySelectorAll(".card-body button").forEach(btn => {
  btn.addEventListener("click", () => {
    modalTitle.textContent = btn.dataset.title;
    modalDesc.textContent = btn.dataset.desc;
    modalLink.href = btn.dataset.link;
    overlay.style.display = "flex";
  });
});

closeBtn.onclick = () => overlay.style.display = "none";
overlay.onclick = (e) => { if(e.target===overlay) overlay.style.display="none"; };

document.addEventListener("DOMContentLoaded", () => {
  const modalOverlay = document.querySelector(".modal-overlay");
  const modalTitle = document.querySelector(".modal h3");
  const modalDesc = document.querySelector(".modal p");
  const modalLink = document.querySelector(".modal a");
  const closeBtn = document.querySelector(".close-btn");

  // Handle Read More buttons
  document.querySelectorAll(".card-body button").forEach(btn => {
    btn.addEventListener("click", () => {
      modalTitle.textContent = btn.dataset.title;
      modalDesc.textContent = btn.dataset.desc;
      modalLink.href = btn.dataset.link;
      modalOverlay.style.display = "flex";
    });
  });

  // Close modal
  closeBtn.addEventListener("click", () => {
    modalOverlay.style.display = "none";
  });

  // Click outside to close
  modalOverlay.addEventListener("click", e => {
    if (e.target === modalOverlay) modalOverlay.style.display = "none";
  });
});
</script>
