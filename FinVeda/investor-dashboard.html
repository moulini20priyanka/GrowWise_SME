<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investor Dashboard - GrowWise</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/css/bootstrap.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background: #f8fafd; margin: 0; color: #333; }
  .header-area { background-color: #000; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; color: #fff; }
  .header-area h1 { margin: 0; font-size: 1.8rem; }
  main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
  .form-group { margin-bottom: 1rem; }
  label { font-weight: 600; display: block; margin-bottom: 0.3rem; }
  input, textarea { width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid #ccc; font-family: 'Inter', sans-serif; box-sizing: border-box; }
  button { background: #1976d2; color: #fff; border: none; padding: 0.7rem 1.5rem; border-radius: 25px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
  button:hover { background: #0d47a1; }
  button:disabled { background: #90caf9; cursor: not-allowed; }
  .status { margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 8px; display: none; }
  .status.success { background: #e8f5e9; color: #2e7d32; display: block; }
  .status.error   { background: #ffebee; color: #c62828; display: block; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore-compat.js"></script>
</head>
<body>

<header class="header-area">
  <h1>GrowWise Investor</h1>
  <nav><a href="home.html" style="color:white; text-decoration:none;">Home</a></nav>
</header>

<main>
  <h2>Fill Your Investor Details</h2>
  <p style="color:#666;">This information will be visible to SMEs looking for investors. You only need to do this once.</p>

  <form id="investorForm">
    <div class="form-group">
      <label>Full Name:</label>
      <input type="text" id="name" placeholder="e.g. Arjun Kapoor" required>
    </div>
    <div class="form-group">
      <label>Role / Title:</label>
      <input type="text" id="role" placeholder="e.g. Angel Investor / VC / Managing Partner" required>
    </div>
    <div class="form-group">
      <label>Email:</label>
      <input type="email" id="email" placeholder="john@example.com" required>
    </div>
    <div class="form-group">
      <label>Phone Number:</label>
      <input type="text" id="phone" placeholder="+91 9876543210" required>
    </div>
    <div class="form-group">
      <label>Investment Range:</label>
      <input type="text" id="investmentRange" placeholder="e.g. 10L - 50L" required>
    </div>
    <div class="form-group">
      <label>Preferred Sector:</label>
      <input type="text" id="preferredSector" placeholder="e.g. FinTech, SaaS, CleanEnergy" required>
    </div>
    <div class="form-group">
      <label>Brief Description:</label>
      <textarea id="desc" rows="5" placeholder="Write a brief about yourself, your investment philosophy and what you look for in startups..." required></textarea>
    </div>
    <button type="submit" id="submitBtn">💾 Save Details</button>
    <div class="status" id="statusMsg"></div>
  </form>
</main>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDZV532N9_KYTuIuH5oG606Qpqhc0lG7no",
    authDomain: "smeproj-c54b4.firebaseapp.com",
    projectId: "smeproj-c54b4",
    storageBucket: "smeproj-c54b4.app",
    messagingSenderId: "415550648607",
    appId: "1:415550648607:web:741b6ba5854391f60a402a"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Pre-fill from currentUser
  const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
  if (currentUser.username)       document.getElementById('name').value            = currentUser.username;
  if (currentUser.email)          document.getElementById('email').value           = currentUser.email;
  if (currentUser.investmentRange) document.getElementById('investmentRange').value = currentUser.investmentRange;
  if (currentUser.preferredSector) document.getElementById('preferredSector').value = currentUser.preferredSector;

  document.getElementById('investorForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    submitBtn.disabled = true;
    submitBtn.textContent = '⏳ Saving...';
    statusMsg.className = 'status';

    const investor = {
      name:            document.getElementById('name').value.trim(),
      role:            document.getElementById('role').value.trim(),
      email:           document.getElementById('email').value.trim(),
      phone:           document.getElementById('phone').value.trim(),
      investmentRange: document.getElementById('investmentRange').value.trim(),
      preferredSector: document.getElementById('preferredSector').value.trim(),
      desc:            document.getElementById('desc').value.trim(),
      createdAt:       new Date().toISOString()
    };

    try {
      // Save to Firestore
      await db.collection('investors').doc(investor.email).set(investor);

      // Update localStorage cache
      const investors = JSON.parse(localStorage.getItem('investors')) || [];
      const existingIdx = investors.findIndex(inv => inv.email === investor.email);
      if (existingIdx >= 0) {
        investors[existingIdx] = investor;
      } else {
        investors.push(investor);
      }
      localStorage.setItem('investors', JSON.stringify(investors));

      // ✅ Mark profile as complete in localStorage
      // So next login skips this page and goes straight to investor-home
      const updatedUser = { ...currentUser, ...investor, profileComplete: true };
      localStorage.setItem('currentUser', JSON.stringify(updatedUser));
      localStorage.setItem('user_' + investor.email, JSON.stringify(updatedUser));

      statusMsg.textContent = '✅ Details saved! Redirecting to your home...';
      statusMsg.className = 'status success';

      setTimeout(() => { window.location.href = 'home.html'; }, 1500);

    } catch (err) {
      console.error('Firestore error:', err);
      statusMsg.textContent = '❌ Error saving: ' + err.message;
      statusMsg.className = 'status error';
      submitBtn.disabled = false;
      submitBtn.textContent = '💾 Save Details';
    }
  });
</script>

</body>
</html>
