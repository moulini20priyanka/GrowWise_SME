<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register & Login</title>
  <link rel="stylesheet" href="./loginPage.css" />
  <link rel="shortcut icon" href="./assets/images/favicon2.webp" type="image/png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore-compat.js"></script>
</head>

<body>

<div class="container">
  <div class="forms-container">
    <div class="signin-signup">

      <!-- SIGN IN -->
      <form class="sign-in-form">
        <h2 class="title">Sign in</h2>
        <div class="input-field">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="Email" id="loginUsername" required />
        </div>
        <div class="input-field">
          <i class="fas fa-user-tag"></i>
          <select id="loginRole" required style="border:none;background:transparent;width:100%;outline:none;">
            <option value="">Select Role</option>
            <option value="Investor">Investor</option>
            <option value="SME">SME</option>
          </select>
        </div>
        <div class="input-field">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Password" id="password-input" required />
        </div>
        <input type="submit" value="Login" class="btn solid" />
      </form>

      <!-- SIGN UP -->
      <form class="sign-up-form">
        <h2 class="title">Sign up</h2>
        <div class="input-field">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="Username" id="signupUsername" required />
        </div>
        <div class="input-field">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="Email" id="signupEmail" required />
        </div>
        <div class="input-field">
          <i class="fas fa-user-tag"></i>
          <select id="signupRole" required style="border:none;background:transparent;width:100%;outline:none;">
            <option value="">Select Role</option>
            <option value="Investor">Investor</option>
            <option value="SME">SME</option>
          </select>
        </div>

        <!-- INVESTOR FIELDS -->
        <div id="investorFields" style="display:none;">
          <div class="input-field">
            <i class="fas fa-rupee-sign"></i>
            <input type="text" id="investmentRange" placeholder="Investment Range (e.g. 10L - 50L)">
          </div>
          <div class="input-field">
            <i class="fas fa-briefcase"></i>
            <input type="text" id="preferredSector" placeholder="Preferred Sector (e.g. FinTech, CleanEnergy)">
          </div>
        </div>

        <!-- SME FIELDS -->
        <div id="smeFields" style="display:none;">
          <div class="input-field">
            <i class="fas fa-building"></i>
            <input type="text" id="businessName" placeholder="Business Name">
          </div>
          <div class="input-field">
            <i class="fas fa-id-card"></i>
            <input type="text" id="gstNumber" placeholder="GST Number">
          </div>
        </div>

        <div class="input-field">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Password" id="password-input-signup" required />
        </div>
        <input type="submit" class="btn" value="Sign up" />
      </form>

    </div>
  </div>

  <!-- PANELS -->
  <div class="panels-container">
    <div class="panel left-panel">
      <div class="content">
        <h3>New here?</h3>
        <p>Create your account.</p>
        <button class="btn transparent" id="sign-up-btn">Sign up</button>
      </div>
    </div>
    <div class="panel right-panel">
      <div class="content">
        <h3>One of us?</h3>
        <p>Welcome back</p>
        <button class="btn transparent" id="sign-in-btn">Sign in</button>
      </div>
    </div>
  </div>
</div>

<script>
/* SWITCH PANELS */
const sign_in_btn = document.querySelector("#sign-in-btn");
const sign_up_btn = document.querySelector("#sign-up-btn");
const container   = document.querySelector(".container");

sign_up_btn.addEventListener("click", () => container.classList.add("sign-up-mode"));
sign_in_btn.addEventListener("click", () => container.classList.remove("sign-up-mode"));

/* SHOW ROLE FIELDS */
document.getElementById("signupRole").addEventListener("change", function () {
  const role = this.value;
  document.getElementById("investorFields").style.display = role === "Investor" ? "block" : "none";
  document.getElementById("smeFields").style.display      = role === "SME"      ? "block" : "none";
});

/* FIREBASE INIT */
const firebaseConfig = {
  apiKey: "AIzaSyDZV532N9_KYTuIuH5oG606Qpqhc0lG7no",
  authDomain: "smeproj-c54b4.firebaseapp.com",
  projectId: "smeproj-c54b4",
  storageBucket: "smeproj-c54b4.app",
  messagingSenderId: "415550648607",
  appId: "1:415550648607:web:741b6ba5854391f60a402a",
  measurementId: "G-BQR7LFZ1Z1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ── REGISTER ── */
document.querySelector(".sign-up-form").addEventListener("submit", function (e) {
  e.preventDefault();

  const username = document.getElementById("signupUsername").value.trim();
  const email    = document.getElementById("signupEmail").value.trim();
  const password = document.getElementById("password-input-signup").value;
  const role     = document.getElementById("signupRole").value;

  if (!role) { alert("Please select a role"); return; }

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {
      const user = userCredential.user;
      const userData = { uid: user.uid, username, email, role, profileComplete: false };

      if (role === "Investor") {
        userData.investmentRange = document.getElementById("investmentRange").value;
        userData.preferredSector = document.getElementById("preferredSector").value;

        // Save to localStorage investors array (local cache)
        const investors = JSON.parse(localStorage.getItem('investors')) || [];
        const alreadyExists = investors.some(inv => inv.email === email);
        if (!alreadyExists) {
          investors.push({
            name:            username,
            email:           email,
            role:            "Investor",
            desc:            `Interested in ${userData.preferredSector}. Investment range: ${userData.investmentRange}.`,
            investmentRange: userData.investmentRange,
            preferredSector: userData.preferredSector
          });
          localStorage.setItem('investors', JSON.stringify(investors));
        }

      } else if (role === "SME") {
        userData.businessName = document.getElementById("businessName").value;
        userData.gstNumber    = document.getElementById("gstNumber").value;
      }

      localStorage.setItem("user_" + email, JSON.stringify(userData));
      localStorage.setItem("currentUser", JSON.stringify(userData));

      alert(`✅ Account created as ${role}! Please sign in.`);
      container.classList.remove("sign-up-mode");
    })
    .catch((error) => alert(error.message));
});

/* ── LOGIN ── */
document.querySelector(".sign-in-form").addEventListener("submit", async function (e) {
  e.preventDefault();

  const email        = document.getElementById("loginUsername").value.trim();
  const password     = document.getElementById("password-input").value;
  const selectedRole = document.getElementById("loginRole").value;

  if (!selectedRole) { alert("Please select a role"); return; }

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(async (userCredential) => {
      const storedUser = JSON.parse(localStorage.getItem("user_" + email)) || {};

      if (storedUser.role && storedUser.role !== selectedRole) {
        alert("❌ Role mismatch! You registered as " + storedUser.role);
        firebase.auth().signOut();
        return;
      }

      localStorage.setItem("currentUser", JSON.stringify({ ...storedUser, email, role: selectedRole }));
      localStorage.setItem("isLoggedIn", "true");

      if (selectedRole === "Investor") {
        // ✅ Check Firestore if investor has already completed their profile
        try {
          const doc = await db.collection('investors').doc(email).get();
          if (doc.exists) {
            // Profile already filled → go straight to home
            window.location.href = "./home.html";
          } else {
            // First time → go to dashboard to fill profile
            window.location.href = "./investor-dashboard.html";
          }
        } catch (err) {
          // If Firestore check fails, fallback: check localStorage
          const localProfile = JSON.parse(localStorage.getItem("user_" + email)) || {};
          if (localProfile.profileComplete) {
            window.location.href = "./home.html";
          } else {
            window.location.href = "./investor-dashboard.html";
          }
        }

      } else if (selectedRole === "SME") {
        window.location.href = "./index.html";
      }
    })
    .catch((error) => alert(error.message));
});
</script>

</body>
</html>
